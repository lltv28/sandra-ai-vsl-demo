<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor AI · Symptom Triage Reveal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="reveal.css">
</head>
<body style="--src:#23835a">
  <div class="stage">
    <div class="card" id="card">

      <div class="layer loading">
        <div class="l-av">🩺</div>
        <div class="l-name">Doctor AI</div>
        <div class="l-lock">
          <span class="node">🩺 You</span>
          <span class="flow">▸▸▸</span>
          <span class="node"><img src="logos/quest.png" alt="MyQuest · Quest Diagnostics"></span>
        </div>
        <div class="l-prog"><i id="bar"></i></div>
        <div class="l-status" id="status">Connecting to MyQuest…</div>
      </div>

      <div class="layer report">
        <div class="r-top">
          <div class="r-av">🩺</div>
          <div class="r-who">Doctor AI<small>Intake complete · 7 flags</small></div>
        </div>
        <div class="r-bar"><img src="logos/quest.png" alt="MyQuest"><span class="ok">✓ Synced</span><span class="txt">· lab panel imported</span></div>
        <div class="r-headline big">What needs attention now vs. what can wait</div>
        <div class="r-triage">
          <div class="r-tg ok">Likely fine — just watch<span class="c">2</span></div>
          <div class="r-tg chk">Worth checking this week<span class="c">1</span></div>
          <div class="r-tg urg">Urgent / worth seeing someone<span class="c">4</span></div>
        </div>
        <div class="r-locked"><span>Your one clear next step<small>Step one — locked</small></span><span class="r-pill">Unlock $19</span></div>
      </div>

    </div>
  </div>
  <button id="replay">↺ Replay</button>

  <script>
    window.REVEAL = {
      loadMs: 1900, holdMs: 3200,
      steps: [[0, 'Connecting to MyQuest…'], [750, 'Importing your last lab panel…'], [1650, 'Flagging what needs attention…']]
    };
  </script>
  <script src="reveal.js"></script>
</body>
</html>
